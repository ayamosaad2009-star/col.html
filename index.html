<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة السعرات الحرارية الاحترافية</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .calculator-box {
            background-color: #262626;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border-top: 5px solid #ff4500;
        }
        h2 {
            text-align: center;
            color: #ff4500;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            background-color: #333;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #ff4500;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: #e03e00;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #333;
            border-radius: 5px;
            display: none;
            text-align: center;
        }
        .result-box h3 {
            margin: 0 0 10px 0;
            color: #00ffcc;
        }
        .result-box p {
            font-size: 24px;
            font-weight: bold;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="calculator-box">
    <h2>حاسبة السعرات الحرارية 🏋️‍♂️</h2>
    
    <div class="form-group">
        <label>الوزن (كيلو جرام):</label>
        <input type="number" id="weight" placeholder="مثال: 70">
    </div>
    
    <div class="form-group">
        <label>الطول (سم):</label>
        <input type="number" id="height" placeholder="مثال: 175">
    </div>
    
    <div class="form-group">
        <label>العمر:</label>
        <input type="number" id="age" placeholder="مثال: 22">
    </div>
    
    <div class="form-group">
        <label>مستوى النشاط اليومي:</label>
        <select id="activity">
            <option value="1.2">خامل (بدون تمارين)</option>
            <option value="1.375">نشاط خفيف (تمارين 1-3 أيام)</option>
            <option value="1.55">نشاط متوسط (تمارين 3-5 أيام)</option>
            <option value="1.725">نشاط عالي (تمارين شاقة يومياً)</option>
        </select>
    </div>
    
    <button onclick="calculateCalories()">احسب السعرات الحين</button>
    
    <div class="result-box" id="resultBox">
        <h3>سعرات المحافظة اليومية:</h3>
        <p id="caloriesResult">0</p> <span style="color: #aaa;">سعرة حرارية</span>
    </div>
</div>

<script>
    function calculateCalories() {
        // جلب المدخلات
        const weight = parseFloat(document.getElementById('weight').value);
        const height = parseFloat(document.getElementById('height').value);
        const age = parseFloat(document.getElementById('age').value);
        const activity = parseFloat(document.getElementById('activity').value);
        
        // التحقق من أن المستخدم أدخل أرقام صحيحة
        if (!weight || !height || !age) {
            alert("من فضلك املأ جميع الخانات بالأرقام أولاً يا بطل!");
            return;
        }
        
        // معادلة Mifflin-St Jeor الحقيقية لحساب عمليات الأيض (BMR) للرجال
        const bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
        
        // حساب السعرات الإجمالية بناءً على النشاط
        const totalCalories = Math.round(bmr * activity);
        
        // إظهار النتيجة في الصفحة
        document.getElementById('caloriesResult').innerText = totalCalories;
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
